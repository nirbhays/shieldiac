name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
      - name: Run linting
        run: |
          ruff check backend/
          ruff format --check backend/
      - name: Run tests
        run: |
          cd backend
          python -m pytest ../tests/ -v --tb=short --cov=backend --cov-report=xml
        env:
          SHIELDIAC_REDIS_URL: redis://localhost:6379/0
          SHIELDIAC_ENVIRONMENT: development
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx tsc --noEmit
      - name: Lint
        run: cd frontend && npm run lint
      - name: Build
        run: cd frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t shieldiac-backend:test backend/
      - name: Test Docker image
        run: |
          docker run -d -p 8000:8000 --name shieldiac-test shieldiac-backend:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop shieldiac-test
